services:
  # Spring Boot Web Service (main app)
  - type: web
    name: urllink-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: APP_BASE_URL
        sync: false

  # Python Metadata Worker (background)
  - type: worker
    name: urllink-worker
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    plan: free
    envVars:
      - key: MONGODB_URI
        sync: false
