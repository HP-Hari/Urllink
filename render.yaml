services:
  # Spring Boot Web Service (main app)
  - type: web
    name: urly
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: APP_BASE_URL
        sync: false

  # Python Metadata Worker (background)
  - type: worker
    name: urly-worker
    runtime: docker
    dockerfilePath: ./Dockerfile.worker
    plan: free
    envVars:
      - key: MONGODB_URI
        sync: false
